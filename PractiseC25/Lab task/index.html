<!DOCTYPE html>
<html>
<head>
<title>Global Tech Connect Event</title>
</head>

<body>

<h2>Event Registration</h2>

<form id="regForm">

<label>Full Name</label><br>
<input type="text" id="name">
<p id="nameError"></p>

<label>Email</label><br>
<input type="text" id="email">
<p id="emailError"></p>

<label>Company / Institution</label><br>
<input type="text" id="company">
<p id="companyError"></p>

<label>Attendance Type</label><br>
<input type="radio" name="attendance" value="Virtual"> Virtual
<input type="radio" name="attendance" value="In-Person"> In-Person
<p id="attendanceError"></p>

<br>
<button type="submit">Register</button>

</form>

<br>

<button onclick="toggleAnalytics()" id="analyticsBtn">
Show Event Analytics
</button>

<div id="analyticsPanel" style="display:none">

<h3>Event Statistics</h3>

<p>Total Registrants: <span id="total">0</span></p>
<p>Virtual: <span id="virtualCount">0</span></p>
<p>In-Person: <span id="inpersonCount">0</span></p>

</div>

<script src="script.js"></script>

</body>
</html>
