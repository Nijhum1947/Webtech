<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>
</head>

<body>

<h2>Global Tech Connect - Registration</h2>

<form id="regForm">

Full Name:<br>
<input type="text" id="name">
<p id="nameError"></p>

Email:<br>
<input type="text" id="email">
<p id="emailError"></p>

Company:<br>
<input type="text" id="company">

<br><br>

Attendance Type:<br>
<input type="radio" name="attendance" value="Virtual"> Virtual
<input type="radio" name="attendance" value="In-Person"> In-Person
<p id="attendanceError"></p>

<br>

<button type="submit">Register</button>

</form>

<br>

<button onclick="toggleAnalytics()" id="analyticsBtn">
Show Event Analytics
</button>

<div id="analyticsPanel" style="display:none">

<h3>Event Statistics</h3>

Total Registrants: <span id="total">0</span><br>
Virtual: <span id="virtualCount">0</span><br>
In-Person: <span id="inpersonCount">0</span>

</div>

<script src="srcipt.js"></script>

</body>
</html>
